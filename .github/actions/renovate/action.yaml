# yaml-language-server: $schema=https://www.schemastore.org/github-action.json
name: Prepare build environment
description: Setup Node.js & pnpm
inputs:
  node-version:
    description: Define Node.js version
    required: false
    default: "24"
  using-local-renovate:
    description: if true, using package.json renovate
    required: false
    default: "false"
  renovate-config-file:
    description: "Set renovate.global.json path (Default: .github/renovate.global.json)"
    required: false
    default: .github/renovate.global.json
  renovate-token:
    description: Set GitHub Personal Access Token using Renovate
    required: true
  dry-run:
    description: if true, dry run renovate
    required: false
    default: "false"


runs:
  using: composite
  steps:
    - name: Setup pnpm
      if: ${{ inputs.using-local-renovate == 'true' }}
      uses: pnpm/action-setup@v6
      with:
        cache: true

    - name: Setup Node.js ${{ inputs.node-version }} enabled pnpm cache
      if: ${{ inputs.using-local-renovate == 'true' }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: "pnpm"

    - name: Setup Node.js ${{ inputs.node-version }}
      if: ${{ inputs.using-local-renovate == 'false' }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Get npm cache dir
      if: ${{ inputs.using-local-renovate == 'false' }}
      id: npm-cache-dir
      shell: bash
      run: echo "dir=$(npm config get cache)" >> "$GITHUB_OUTPUT"

    - name: Cache npm cache for npx renovate
      if: ${{ inputs.using-local-renovate == 'false' }}
      uses: actions/cache@v4
      with:
        path: ${{ steps.npm-cache-dir.outputs.dir }}
        key: ${{ runner.os }}-node-${{ inputs.node-version }}-npx-renovate-v43
        restore-keys: |
          ${{ runner.os }}-node-${{ inputs.node-version }}-npx-renovate-

    - name: Run npm renovate
      if: ${{ inputs.using-local-renovate == 'true' }}
      shell: bash
      run: pnpm exec renovate
      env:
        RENOVATE_CONFIG_FILE: ${{ inputs.renovate-config-file }}
        RENOVATE_TOKEN: ${{ inputs.renovate-token }}
        RENOVATE_HOST_RULES: '[{"hostType":"npm","matchHost":"https://npm.pkg.github.com/","token":"${{ inputs.renovate-token }}"}]'
        RENOVATE_DRY_RUN: ${{ inputs.dry-run }}
        RENOVATE_GIT_AUTHOR: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>

    - name: Execute npx renovate
      if: ${{ inputs.using-local-renovate == 'false' }}
      shell: bash
      run: npx -y renovate@^43
      env:
        RENOVATE_CONFIG_FILE: ${{ inputs.renovate-config-file }}
        RENOVATE_TOKEN: ${{ inputs.renovate-token }}
        RENOVATE_HOST_RULES: '[{"hostType":"npm","matchHost":"https://npm.pkg.github.com/","token":"${{ inputs.renovate-token }}"}]'
        RENOVATE_DRY_RUN: ${{ inputs.dry-run }}
        RENOVATE_GIT_AUTHOR: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
